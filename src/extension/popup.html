<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPD AI 自动填单</title>
  <style>
    :root {
      --primary: #dc0032;
      --primary-dark: #b8002a;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #333333;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    body {
      width: 440px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 600;
    }
    .mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }
    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea {
      height: 116px;
      resize: vertical;
      margin-bottom: 12px;
    }
    input {
      margin-bottom: 12px;
    }
    input:focus,
    textarea:focus {
      border-color: var(--primary);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button.secondary {
      background: #111827;
    }
    button:hover {
      background: var(--primary-dark);
    }
    button.secondary:hover {
      background: #374151;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
    #preview {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }
    .shipment {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-weight: 400;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .shipment:hover {
      background: #fff;
      border-color: #cbd5e1;
    }
    .shipment.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .shipment strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .shipment span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.45;
    }
    .loading { color: #666; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    /* 加载状态动画 */
    
    /* 加载状态动画 */
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .loading-btn {
      animation: pulse 1.5s infinite;
      position: relative;
      overflow: hidden;
    }
    .loading-btn::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmers 1.5s infinite;
    }
    @keyframes shimmers {
      100% { left: 100%; }
    }

    /* 更新提示条样式 */
    .update-banner {
      background: #fff3cd;
      color: #856404;
      padding: 10px 16px;
      margin: -16px -16px 16px -16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ffeeba;
      animation: slideDown 0.3s ease-out;
    }
    .update-banner a {
      color: #0056b3;
      font-weight: bold;
      text-decoration: underline;
    }
    .update-banner .close-update {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.5;
    }
    .update-banner .close-update:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- 更新提示条 -->
  <div id="updateBanner" class="update-banner" style="display: none;">
    <span>🚀</span>
    <span id="updateText">发现新版本!</span>
    <a href="https://github.com/folgercn/dpd-api/releases" target="_blank">立即下载</a>
    <span id="closeUpdate" class="close-update">&times;</span>
  </div>

  <div class="header">
    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
      <div class="mark">DPD</div>
      <h1>DPD 地址解析</h1>
      <span id="versionTag" class="badge">v1.0.20</span>
    </div>
  </div>
  
  <div class="card">
    <div id="mainContent">
      <label for="pasteArea">表格内容</label>
      <textarea id="pasteArea" style="height: 150px;" placeholder="粘贴 Excel 表格行数据..."></textarea>
      <div class="actions">
        <button id="fillBtn" class="primary" style="width: 100%; height: 44px; font-size: 16px;">立即填入 DPD 表单</button>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
