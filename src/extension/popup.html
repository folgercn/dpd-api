<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPD AI 自动填单</title>
  <style>
    :root {
      --primary: #dc0032;
      --primary-dark: #b8002a;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #333333;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    body {
      width: 560px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 600;
    }
    .mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }
    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea {
      height: 154px;
      resize: vertical;
      margin-bottom: 12px;
    }
    input {
      margin-bottom: 12px;
    }
    input:focus,
    textarea:focus {
      border-color: var(--primary);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button.secondary {
      background: #111827;
    }
    button:hover {
      background: var(--primary-dark);
    }
    button.secondary:hover {
      background: #374151;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
    #preview {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }
    .shipment {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-weight: 400;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .shipment:hover {
      background: #fff;
      border-color: #cbd5e1;
    }
    .shipment.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .shipment strong {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .shipment .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
    }
    .shipment span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.45;
    }
    .shipment .field-row {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 12px;
      line-height: 1.45;
      min-width: 0;
    }
    .shipment .field-label {
      color: #6b7280;
      font-weight: 600;
    }
    .shipment .field-value {
      color: #374151;
      word-break: break-word;
      white-space: pre-wrap;
    }
    @media (max-width: 520px) {
      .shipment .fields-grid {
        grid-template-columns: 1fr;
      }
    }
    .loading { color: #666; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .settings-panel {
      display: none;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px dashed #d1d5db;
    }
    .settings-panel.active {
      display: block;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: auto;
    }
    .icon-btn:hover {
      color: var(--primary);
      background: transparent;
    }
    .auth-section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e5e7eb;
      color: #666;
    }
    .badge.success {
      background: #dcfce7;
      color: #166534;
    }
    .update-banner {
      background: #fff3cd;
      border: 1px solid #ffeeba;
      color: #856404;
      padding: 8px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .update-banner a {
      color: #0056b3;
      font-weight: 700;
      text-decoration: underline;
    }
    .update-banner .close-update {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.5;
      font-size: 16px;
      line-height: 1;
    }
    .update-banner .close-update:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="updateBanner" class="update-banner" style="display: none;">
    <span>🚀</span>
    <span id="updateText">发现新版本!</span>
    <a id="updateLink" href="https://github.com/folgercn/dpd-api/releases/latest" target="_blank">立即下载</a>
    <span id="closeUpdate" class="close-update">&times;</span>
  </div>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
      <div class="mark">DPD</div>
      <h1>AI 填单助手</h1>
      <span id="versionTag" class="badge">v1.0.22</span>
    </div>
    <button id="settingsToggle" class="icon-btn" title="设置">⚙️</button>
  </div>

  <div class="card">
    <div id="settingsPanel" class="settings-panel">
      <label for="apiUrl">API 接口地址</label>
      <input id="apiUrl" type="url" placeholder="https://dpdapi.sunnywifi.cn/api/parse-address">
      <label for="licenseKey">激活码 / Token</label>
      <div style="display: flex; gap: 8px;">
        <input id="licenseKey" type="password" placeholder="请输入您的激活码" style="margin-bottom: 0;">
        <button id="activateBtn" style="width: 80px;">激活</button>
      </div>
      <div id="authStatus" style="font-size: 11px; margin-top: 6px; color: var(--muted);"></div>
    </div>

    <div id="lockOverlay" style="display: none; text-align: center; padding: 20px 0;">
      <div style="font-size: 32px; margin-bottom: 12px;">🔒</div>
      <p style="font-size: 14px; color: var(--muted); margin-bottom: 12px;">请先在设置中输入激活码以解锁功能</p>
    </div>

    <div id="mainContent">
      <label for="pasteArea">表格内容</label>
      <textarea id="pasteArea" placeholder="粘贴 Excel 中复制的姓名、地址、邮编、城市、电话、重量等列"></textarea>
      <div class="actions">
        <button id="parseBtn" class="secondary">解析预览</button>
        <button id="fillBtn" disabled>填入当前页</button>
      </div>
      <div id="preview"></div>
    </div>
  </div>

  <div id="status"></div>

  <div class="footer">
    <span>AI 地址解析 · DPD API</span>
    <span style="color: #ccc;">business.dpd.de</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
