name: Master Deploy & Auto Release (Serverless Mode)

on:
  push:
    branches: [ main ]

jobs:
  release-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 1. 自动打标获取新版本号 ---
      - name: Auto Tagging
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      # --- 2. 同步版本号到插件配置文件 ---
      - name: Update manifest version
        run: |
          VERSION=${{ steps.tag_version.outputs.new_tag }}
          VERSION_CLEAN=${VERSION#v}
          echo "Syncing manifest to $VERSION_CLEAN"
          # 使用 perl 代替 sed 以获得更好的兼容性
          perl -pi -e "s/\"version\": \".*?\"/\"version\": \"$VERSION_CLEAN\"/" src/extension/manifest.json

      # --- 3. 打包插件 ZIP ---
      - name: Zip extension
        run: |
          cd src/extension
          zip -r ../../dpd-extension.zip .

      # --- 4. 发布 GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          files: dpd-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- 5. 生成 version.json 用于插件在线检查更新 ---
      - name: Generate version.json
        run: |
          VERSION=${{ steps.tag_version.outputs.new_tag }}
          VERSION_CLEAN=${VERSION#v}
          cat <<EOF > version.json
          {
            "version": "$VERSION_CLEAN",
            "url": "https://github.com/folgercn/dpd-api/releases/latest",
            "downloadUrl": "https://github.com/folgercn/dpd-api/releases/download/$VERSION/dpd-extension.zip",
            "changelog": "本地解析引擎优化，适配 DPD 最新发货和退货页面，支持国家选择器和多行地址。"
          }
          EOF

      # --- 6. 部署到 GitHub Pages (存放 version.json 和 updates.xml) ---
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
