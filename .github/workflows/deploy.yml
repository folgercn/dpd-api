name: Master Deploy & Auto Release

on:
  push:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      extension: ${{ steps.filter.outputs.extension }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/app/**'
              - 'src/lib/**'
              - 'src/instrumentation.ts'
              - 'next.config.ts'
              - 'ecosystem.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            extension:
              - 'src/extension/**'
              - '.github/workflows/deploy.yml'

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare server deploy directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/dpd-api
            find ~/dpd-api -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'logs' \
              -exec rm -rf {} +

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next,package.json,package-lock.json,next.config.ts,ecosystem.config.js"
          target: "~/dpd-api"

      - name: SSH and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$PATH:$HOME/.local/bin:$HOME/.nvm/versions/node/$(nvm current)/bin"
            cd ~/dpd-api
            npm install --omit=dev
            pm2 startOrReload ecosystem.config.js
            pm2 save

  release-extension:
    name: Release Extension
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.extension == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto Tagging
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Update extension and package versions
        run: |
          VERSION=${{ steps.tag_version.outputs.new_tag }}
          VERSION_CLEAN=${VERSION#v}
          echo "Syncing extension/package versions to $VERSION_CLEAN"
          VERSION_CLEAN="$VERSION_CLEAN" node - <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION_CLEAN;

          const manifestPath = 'src/extension/manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          manifest.version = version;
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');

          const packagePath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(packagePath, JSON.stringify(pkg, null, 2) + '\n');

          const packageLockPath = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(packageLockPath, 'utf8'));
          lock.version = version;
          if (lock.packages && lock.packages['']) {
            lock.packages[''].version = version;
          }
          fs.writeFileSync(packageLockPath, JSON.stringify(lock, null, 2) + '\n');
          EOF

      - name: Zip extension
        run: |
          cd src/extension
          zip -r ../../dpd-extension.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          files: dpd-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate update metadata
        run: |
          VERSION=${{ steps.tag_version.outputs.new_tag }}
          VERSION_CLEAN=${VERSION#v}
          cat <<EOF > version.json
          {
            "version": "$VERSION_CLEAN",
            "url": "https://github.com/folgercn/dpd-api/releases/latest",
            "downloadUrl": "https://github.com/folgercn/dpd-api/releases/download/$VERSION/dpd-extension.zip",
            "changelog": "本地解析引擎优化，适配 DPD 最新发货和退货页面，支持国家选择器和多行地址。"
          }
          EOF
          cat <<EOF > updates.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="dneekmpoflmfalfbnlbookgdcfonncfl">
              <updatecheck codebase="https://github.com/folgercn/dpd-api/releases/download/$VERSION/dpd-extension.zip" version="$VERSION_CLEAN" />
            </app>
          </gupdate>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
