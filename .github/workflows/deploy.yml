name: Deploy to Production

on:
  push:
    branches: [ main ] # 只有推送到 main 分支时才触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db" # 构建时使用的占位符

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 只同步运行生产环境必需的文件，节省带宽和空间
          source: ".next,public,package.json,package-lock.json,next.config.ts,ecosystem.config.js,prisma"
          target: "~/dpd-api"

      - name: SSH and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/dpd-api
            # 安装生产环境依赖
            npm install --production
            # 同步数据库结构
            npx prisma db push
            # 重启 PM2 进程
            pm2 startOrReload ecosystem.config.js
            pm2 save
